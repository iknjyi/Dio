          {TESTIMONIALS.map((t,i)=>(<TestimonialCard key={i} t={t} index={i} />))}
        </div>
      </div>
    </section>
  );
}

/* ============ CONTACT FORM ============ */

function ContactForm(){
  const [submitted, setSubmitted] = useState(false);
  const handleSubmit = (e) => {
    e.preventDefault();
    setSubmitted(true);
  };
  return (
    <form onSubmit={handleSubmit} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <input required placeholder="Name" className="sm:col-span-1 px-5 py-4 rounded-2xl bg-white/10 border border-white/15 text-white placeholder:text-white/40 focus:border-[var(--accent)] outline-none transition-colors" />
      <input required type="email" placeholder="Email" className="sm:col-span-1 px-5 py-4 rounded-2xl bg-white/10 border border-white/15 text-white placeholder:text-white/40 focus:border-[var(--accent)] outline-none transition-colors" />
      <select required defaultValue="" className="sm:col-span-1 px-5 py-4 rounded-2xl bg-white/10 border border-white/15 text-white outline-none focus:border-[var(--accent)] transition-colors [&>option]:text-black">
        <option value="" disabled>Project type</option>
        <option>Commercial</option>
        <option>YouTube / Documentary</option>
        <option>Music Video</option>
        <option>Social Reels</option>
        <option>Brand Film</option>
        <option>Other</option>
      </select>
      <select required defaultValue="" className="sm:col-span-1 px-5 py-4 rounded-2xl bg-white/10 border border-white/15 text-white outline-none focus:border-[var(--accent)] transition-colors [&>option]:text-black">
        <option value="" disabled>Budget range</option>
        <option>Under $1,000</option>
        <option>$1,000 – $5,000</option>
        <option>$5,000 – $15,000</option>
        <option>$15,000+</option>
      </select>
      <textarea required placeholder="Tell me about your project" rows="4" className="sm:col-span-2 px-5 py-4 rounded-2xl bg-white/10 border border-white/15 text-white placeholder:text-white/40 outline-none focus:border-[var(--accent)] transition-colors resize-none"></textarea>
      <button type="submit" className="sm:col-span-2 mt-2 px-7 py-4 rounded-2xl bg-white text-black font-semibold hover:bg-[var(--accent)] hover:text-white transition-colors duration-300">
        {submitted ? "Sent — I'll be in touch soon" : "Send Message"}
      </button>
    </form>
  );
}
